<body class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<!-- Supressing Navigation Shell for Focused Transactional Flow -->
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12">
<!-- Brand Identity Section -->
<header class="mb-12 text-center">
<div class="mb-4 inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-highest text-primary">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
</div>
<h1 class="font-headline font-bold text-4xl tracking-tight text-on-surface mb-2">Refugio Editorial</h1>
<p class="font-body text-on-surface-variant max-w-xs mx-auto text-sm leading-relaxed">
                Tu santuario digital para el acompañamiento terapéutico y la reflexión personal.
            </p>
</header>
<!-- Login Container -->
<section class="w-full max-w-sm">
<div class="bg-surface-container-low rounded-[2rem] p-8 shadow-[0_12px_32px_rgba(55,56,49,0.06)] relative overflow-hidden">
<!-- Subtle visual accent -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16 blur-3xl"></div>
<form class="relative z-10 space-y-6">
<!-- Role Selector (Asymmetric/Editorial Style) -->
<div class="space-y-3">
<span class="block font-label text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">¿CÓMO INGRESAS HOY?</span>
<div class="grid grid-cols-2 gap-2 bg-surface-container-highest p-1 rounded-2xl">
<button class="py-2.5 px-4 rounded-xl text-sm font-semibold transition-all duration-300 bg-surface-container-lowest text-primary shadow-sm" type="button">
                                Soy paciente
                            </button>
<button class="py-2.5 px-4 rounded-xl text-sm font-semibold transition-all duration-300 text-on-surface-variant hover:bg-surface-container-low" type="button">
                                Soy terapeuta
                            </button>
</div>
</div>
<!-- Input Fields -->
<div class="space-y-5">
<div class="space-y-1.5">
<label class="block font-label text-xs font-bold text-on-surface-variant ml-1" for="email">CORREO ELECTRÓNICO</label>
<input class="w-full bg-surface-container-highest border-0 border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 rounded-t-xl px-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/40 transition-colors bg-opacity-50 focus:bg-surface-container-lowest" id="email" name="email" placeholder="ejemplo@correo.com" type="email"/>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="block font-label text-xs font-bold text-on-surface-variant ml-1" for="password">CONTRASEÑA</label>
<a class="text-[11px] font-bold text-tertiary hover:underline uppercase tracking-tighter" href="#">¿Olvidaste la clave?</a>
</div>
<input class="w-full bg-surface-container-highest border-0 border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 rounded-t-xl px-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/40 transition-colors bg-opacity-50 focus:bg-surface-container-lowest" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<div class="pt-2">
<button class="w-full bg-editorial-gradient text-on-primary py-4 rounded-full font-bold tracking-wide shadow-lg shadow-primary/20 active:scale-95 transition-all duration-200" type="submit">
                            Iniciar Sesión
                        </button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-px flex-grow bg-outline-variant/20"></div>
<span class="font-label text-[10px] text-on-surface-variant/60 font-bold uppercase tracking-widest">O</span>
<div class="h-px flex-grow bg-outline-variant/20"></div>
</div>
<!-- Magic Link Action -->
<button class="w-full border-0 bg-secondary-container text-on-secondary-container py-4 rounded-full font-bold tracking-wide flex items-center justify-center gap-2 hover:bg-secondary-fixed transition-colors active:scale-95 duration-200" type="button">
<span class="material-symbols-outlined text-xl">magic_button</span>
                        Ingresar sin contraseña
                    </button>
</form>
</div>
<!-- Footer Links -->
<footer class="mt-8 text-center space-y-4">
<p class="text-sm text-on-surface-variant">
                    ¿No tienes una cuenta? 
                    <a class="text-primary font-bold hover:underline" href="#">Regístrate aquí</a>
</p>
<div class="flex justify-center gap-6 pt-4">
<a class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/40 hover:text-on-surface transition-colors" href="#">Privacidad</a>
<a class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/40 hover:text-on-surface transition-colors" href="#">Términos</a>
<a class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/40 hover:text-on-surface transition-colors" href="#">Soporte</a>
</div>
</footer>
</section>
</main>
